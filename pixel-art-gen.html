<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>忍者像素圖生成器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #eee;
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      padding: 28px 32px;
      min-height: 100vh;
    }

    header { margin-bottom: 28px; }
    header h1 { font-size: 26px; color: #FF4500; letter-spacing: 1px; }
    header p  { font-size: 13px; color: #666; margin-top: 4px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 18px;
      margin-bottom: 28px;
    }
    .toolbar label { font-size: 12px; color: #888; margin-right: 4px; }
    .toolbar select, .toolbar input[type=range] {
      background: #222; color: #ddd;
      border: 1px solid #444; border-radius: 5px;
      padding: 4px 8px; font-size: 12px;
    }
    .toolbar .sep { width: 1px; height: 28px; background: #333; margin: 0 4px; }

    .tb-btn {
      padding: 6px 14px;
      background: #222; color: #bbb;
      border: 1px solid #444; border-radius: 6px;
      cursor: pointer; font-size: 12px;
      transition: all 0.12s;
    }
    .tb-btn:hover { background: #333; color: #fff; border-color: #666; }
    .tb-btn.active { background: #1a3a1a; color: #88FF88; border-color: #3a8a3a; }
    #btn-dl-all {
      background: #3a0000; color: #FF8888;
      border-color: #882222; font-weight: bold;
    }
    #btn-dl-all:hover { background: #4a0000; }

    /* ── Grid ── */
    #sprite-grid {
      display: flex; flex-wrap: wrap; gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      transition: border-color 0.15s, transform 0.15s;
      cursor: default;
      user-select: none;
    }
    .card:hover {
      border-color: #555;
      transform: translateY(-2px);
    }
    .card canvas {
      display: block;
      margin: 0 auto 10px;
      border-radius: 6px;
      /* checkerboard default — will be overridden by JS */
    }
    .card .cname { font-size: 15px; font-weight: bold; color: #FFD700; margin-bottom: 2px; }
    .card .csub  { font-size: 11px; color: #666; margin-bottom: 10px; }
    .card .cbadge {
      display: inline-block;
      font-size: 10px; padding: 2px 7px;
      border-radius: 10px; margin-bottom: 10px;
      font-weight: bold; letter-spacing: 0.5px;
    }
    .card-btns { display: flex; gap: 6px; justify-content: center; }
    .card-btns button {
      flex: 1;
      padding: 6px 0;
      background: #1e1e1e; color: #aaa;
      border: 1px solid #333; border-radius: 5px;
      cursor: pointer; font-size: 11px;
      transition: all 0.12s;
    }
    .card-btns button:hover { background: #2a2a2a; color: #fff; border-color: #555; }
    .card-btns .dl {
      background: #0d2a0d; color: #66DD66;
      border-color: #1a5a1a;
    }
    .card-btns .dl:hover { background: #143a14; }

    /* ── Checkerboard bg ── */
    .bg-checker {
      background-image:
        linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
        linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
        linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      background-color: #1a1a1a;
    }
    .bg-dark    { background: #0d0d0d; }
    .bg-green   { background: #1a3a14; }
    .bg-white   { background: #ffffff; }
  </style>

// ── State ─────────────────────────────────────────────────
let showOutline = true;
let showGrid    = false;
let bgMode      = 'checker';

// ── Rendering ─────────────────────────────────────────────
const SIZE = 16;

function drawSprite(sprite, scale) {
  // 1. Draw on a 16×16 canvas first
  const tmp = document.createElement('canvas');
  tmp.width = tmp.height = SIZE;
  const tc = tmp.getContext('2d');

  for (let r = 0; r < SIZE; r++) {
    const row = sprite.px[r] || '';
    for (let c = 0; c < SIZE; c++) {
      const col = C[row[c]];
      if (!col) continue;
      tc.fillStyle = col;
      tc.fillRect(c, r, 1, 1);
    }
  }

  // 2. Auto-outline pass (pixel manipulation)
  if (showOutline) {
    const img = tc.getImageData(0, 0, SIZE, SIZE);
    const d   = img.data;
    const out = new Uint8ClampedArray(d.length);

    const dirs4 = [[-1,0],[1,0],[0,-1],[0,1]];
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const i = (r * SIZE + c) * 4;
        if (d[i + 3] > 0) continue; // not transparent, skip
        for (const [dr, dc] of dirs4) {
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) continue;
          const ni = (nr * SIZE + nc) * 4;
          if (d[ni + 3] > 10) {
            out[i] = 15; out[i+1] = 15; out[i+2] = 15; out[i+3] = 255;
            break;
          }
        }
      }
    }

    for (let i = 0; i < d.length; i += 4) {
      if (out[i + 3] > 0 && d[i + 3] === 0) {
        d[i] = out[i]; d[i+1] = out[i+1]; d[i+2] = out[i+2]; d[i+3] = out[i+3];
      }
    }
    tc.putImageData(img, 0, 0);
  }

  // 3. Scale up
  const canvas = document.createElement('canvas');
  canvas.width  = SIZE * scale;
  canvas.height = SIZE * scale;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(tmp, 0, 0, SIZE * scale, SIZE * scale);

  // 4. Pixel grid overlay
  if (showGrid) {
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= SIZE; i++) {
      ctx.beginPath(); ctx.moveTo(i * scale, 0); ctx.lineTo(i * scale, SIZE * scale); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * scale); ctx.lineTo(SIZE * scale, i * scale); ctx.stroke();
    }
  }

  return canvas;
}

// ── Export (no pixel grid, always with outline) ────────────
function exportSprite(sprite, scale) {
  const tmp = document.createElement('canvas');
  tmp.width = tmp.height = SIZE;
  const tc = tmp.getContext('2d');

  for (let r = 0; r < SIZE; r++) {
    const row = sprite.px[r] || '';
    for (let c = 0; c < SIZE; c++) {
      const col = C[row[c]];
      if (!col) continue;
      tc.fillStyle = col;
      tc.fillRect(c, r, 1, 1);
    }
  }

  // Always outline on export
  const img = tc.getImageData(0, 0, SIZE, SIZE);
  const d   = img.data;
  const out = new Uint8ClampedArray(d.length);
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const i = (r * SIZE + c) * 4;
      if (d[i + 3] > 0) continue;
      for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) continue;
        if (d[(nr * SIZE + nc) * 4 + 3] > 10) {
          out[i] = 15; out[i+1] = 15; out[i+2] = 15; out[i+3] = 255; break;
        }
      }
    }
  }
  for (let i = 0; i < d.length; i += 4) {
    if (out[i+3] > 0 && d[i+3] === 0) {
      d[i]=out[i]; d[i+1]=out[i+1]; d[i+2]=out[i+2]; d[i+3]=out[i+3];
    }
  }
  tc.putImageData(img, 0, 0);

  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = SIZE * scale;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(tmp, 0, 0, SIZE * scale, SIZE * scale);
  return canvas;
}

// ── Build cards ───────────────────────────────────────────
function getPreviewScale() { return parseInt(document.getElementById('sel-preview').value); }
function getExportScale()  { return parseInt(document.getElementById('sel-export').value);  }

const bgClass = { checker: 'bg-checker', dark: 'bg-dark', green: 'bg-green', white: 'bg-white' };

function buildCards() {
  const scale   = getPreviewScale();
  const px      = SIZE * scale;
  const gridEl  = document.getElementById('sprite-grid');
  gridEl.innerHTML = '';

  SPRITES.forEach(sprite => {
    // Canvas
    const canvas = drawSprite(sprite, scale);
    canvas.className = bgClass[bgMode];
    canvas.style.cssText = `width:${px}px;height:${px}px;image-rendering:pixelated;border-radius:6px;`;

    // Badge
    const badge = document.createElement('div');
    badge.className = 'cbadge';
    badge.style.cssText = `background:${sprite.badgeColor}22;color:${sprite.badgeColor};border:1px solid ${sprite.badgeColor}55;`;
    badge.textContent = sprite.sub;

    // Download button
    const dlBtn = document.createElement('button');
    dlBtn.className = 'dl';
    dlBtn.textContent = '⬇ PNG';
    dlBtn.addEventListener('click', () => {
      const exp = exportSprite(sprite, getExportScale());
      const a   = document.createElement('a');
      a.download = `naruto_${sprite.id}_${SIZE * getExportScale()}px.png`;
      a.href = exp.toDataURL('image/png');
      a.click();
    });

    // Assemble card
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="cname">${sprite.name}</div>`;
    card.insertBefore(canvas, card.firstChild);
    card.appendChild(badge);
    const btns = document.createElement('div');
    btns.className = 'card-btns';
    btns.appendChild(dlBtn);
    card.appendChild(btns);
    gridEl.appendChild(card);
  });
}

function refreshCanvases() {
  const scale   = getPreviewScale();
  const px      = SIZE * scale;
  document.querySelectorAll('#sprite-grid .card').forEach((card, i) => {
    const sprite = SPRITES[i];
    const canvas = drawSprite(sprite, scale);
    canvas.className = bgClass[bgMode];
    canvas.style.cssText = `width:${px}px;height:${px}px;image-rendering:pixelated;border-radius:6px;`;
    const old = card.querySelector('canvas');
    card.replaceChild(canvas, old);
  });
}

// ── Toolbar events ─────────────────────────────────────────
document.getElementById('sel-preview').addEventListener('change', refreshCanvases);

// Background buttons
['checker','dark','green','white'].forEach(mode => {
  document.getElementById('bg-' + mode).addEventListener('click', () => {
    bgMode = mode;
    document.querySelectorAll('[data-bg]').forEach(b => b.classList.remove('active'));
    document.getElementById('bg-' + mode).classList.add('active');
    refreshCanvases();
  });
});

// Outline toggle
const outlineBtn = document.getElementById('btn-outline');
outlineBtn.addEventListener('click', () => {
  showOutline = !showOutline;
  outlineBtn.textContent = `輪廓 ${showOutline ? 'ON' : 'OFF'}`;
  outlineBtn.classList.toggle('active', showOutline);
  refreshCanvases();
});
outlineBtn.classList.add('active');

// Grid toggle

gridBtn.addEventListener('click', () => {
  showGrid = !showGrid;

});

// Download all
document.getElementById('btn-dl-all').addEventListener('click', () => {
  SPRITES.forEach((s, i) => {
    setTimeout(() => {
      const exp = exportSprite(s, getExportScale());
      const a   = document.createElement('a');
      a.download = `naruto_${s.id}_${SIZE * getExportScale()}px.png`;
      a.href = exp.toDataURL('image/png');
      a.click();
    }, i * 250);
  });
});

// Init
buildCards();
</script>
</body>
</html>
